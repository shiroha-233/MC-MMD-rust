 architectury {
    common("fabric", "forge")
}

dependencies {
    // Architectury API（作为 mod 依赖以启用 Loom 重映射）
    modImplementation("dev.architectury:architectury:9.2.14")
    compileOnly("net.fabricmc:fabric-loader:${project.loader_version}")

    // Skiko / Skia（轮盘 UI 平滑渲染）
    compileOnly("org.jetbrains.skiko:skiko-awt:${project.skiko_version}")

    // ImGui workbench（舞台编辑工作台）
    compileOnly("io.github.spair:imgui-java-binding:${project.imgui_java_version}")
    compileOnly("io.github.spair:imgui-java-lwjgl3:${project.imgui_java_version}") {
        exclude group: "org.lwjgl"
        exclude group: "org.lwjgl.lwjgl"
    }
    
    // JLayer - MP3 解码器（舞台模式音频播放）
    implementation("javazoom:jlayer:1.0.1")
    
    // mc-vr-api - Vivecraft VR API（软依赖，运行时可选，modCompileOnly 触发 Loom 重映射）
    modCompileOnly("maven.modrinth:mc-vr-api:${project.mc_vr_api_version}-fabric,1.20.1")

    testImplementation("org.junit.jupiter:junit-jupiter-api:5.10.2")
    testRuntimeOnly("org.junit.jupiter:junit-jupiter-engine:5.10.2")
}
 
sourceSets {
    main {
        // 无特殊排除设置
    }
}

test {
    useJUnitPlatform()
}
